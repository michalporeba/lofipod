name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Build
        run: npm run build

  demo-integration:
    name: Demo Integration
    runs-on: ubuntu-latest
    needs:
      - verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run demo integration test
        run: npm run test:demo

  pod-integration:
    name: Pod Integration
    runs-on: ubuntu-latest
    needs:
      - verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Community Solid Server integration tests
        run: npm run test:pod

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
      - verify
      - demo-integration
      - pod-integration

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish package
        run: npm publish --provenance --access public
